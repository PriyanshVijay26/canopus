<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEWS | Canopus</title>
    <!-- CSS imports -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/news.css">
</head>
<body data-breadcrumb="ホーム / NEWS">
    <div class="site-shell news-page">
        <!-- Components injected by js/components.js -->
        <div id="global-header"></div>
        <div id="subpage-hero"></div>

        <main class="news-page-content">
            <div class="global-header-mask"></div>
            
            <section class="news-main-section">
                <h1 class="news-main-title">NEWS</h1>

                <!-- Category Filter Bar -->
                <nav class="news-filter-section">
                    <ul class="news-filter-list">
                        <li class="news-filter-item">
                            <a href="#" class="news-filter-link active" data-category="all">
                                <span class="news-filter-square"></span>すべて
                            </a>
                        </li>
                        <li class="news-filter-item">
                            <a href="#" class="news-filter-link" data-category="notice">
                                <span class="news-filter-square"></span>お知らせ
                            </a>
                        </li>
                        <li class="news-filter-item">
                            <a href="#" class="news-filter-link" data-category="other">
                                <span class="news-filter-square"></span>その他
                            </a>
                        </li>
                    </ul>
                </nav>

                <!-- News Listing (Exact layout from index.html) -->
                <div class="news-listing-wrap">
                    <div class="news-listing">
                        <!-- News Row 1 -->
                        <a class="news-row" href="#" data-category="notice">
                            <div class="news-meta">
                                <span class="news-date">2025.02.14</span>
                                <span class="news-badge">お知らせ</span>
                            </div>
                            <span class="news-title">「ゴミカン」リリースのお知らせ</span>
                            <span class="news-arrow">→</span>
                        </a>

                        <!-- News Row 2 -->
                        <a class="news-row" href="#" data-category="notice">
                            <div class="news-meta">
                                <span class="news-date">2025.02.14</span>
                                <span class="news-badge">お知らせ</span>
                            </div>
                            <span class="news-title">「ごみ.Kyouo+」リリースのお知らせ</span>
                            <span class="news-arrow">→</span>
                        </a>

                        <!-- News Row 3 -->
                        <a class="news-row" href="#" data-category="notice">
                            <div class="news-meta">
                                <span class="news-date">2022.12.17</span>
                                <span class="news-badge">お知らせ</span>
                            </div>
                            <span class="news-title">ホームページをOPENしました。</span>
                            <span class="news-arrow">→</span>
                        </a>

                        <!-- News Row 4 -->
                        <a class="news-row" href="#" data-category="other">
                            <div class="news-meta">
                                <span class="news-date">2022.12.17</span>
                                <span class="news-badge news-badge-other">その他</span>
                            </div>
                            <span class="news-title">テキストがあれば入れてください。</span>
                            <span class="news-arrow">→</span>
                        </a>

                        <!-- News Row 5 -->
                        <a class="news-row" href="#" data-category="other">
                            <div class="news-meta">
                                <span class="news-date">2022.12.17</span>
                                <span class="news-badge news-badge-other">その他</span>
                            </div>
                            <span class="news-title">テキストがあれば入れてください。</span>
                            <span class="news-arrow">→</span>
                        </a>

                        <!-- News Row 6 -->
                        <a class="news-row" href="#" data-category="other">
                            <div class="news-meta">
                                <span class="news-date">2022.12.17</span>
                                <span class="news-badge news-badge-other">その他</span>
                            </div>
                            <span class="news-title">テキストがあれば入れてください。</span>
                            <span class="news-arrow">→</span>
                        </a>
                    </div>
                </div>
            </section>
        </main>

        <div id="global-footer"></div>
    </div>

    <!-- Scripts -->
    <script src="js/components.js"></script>
    <script src="js/subpage.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const filterLinks = document.querySelectorAll('.news-filter-link');
            const newsRows = document.querySelectorAll('.news-row');

            filterLinks.forEach(link => {
                link.addEventListener('click', (e) => {
                    e.preventDefault();
                    
                    // Toggle active state
                    filterLinks.forEach(l => l.classList.remove('active'));
                    link.classList.add('active');

                    const category = link.getAttribute('data-category');

                    // Filter news rows
                    newsRows.forEach(row => {
                        if (category === 'all' || row.getAttribute('data-category') === category) {
                            row.classList.remove('hidden');
                        } else {
                            row.classList.add('hidden');
                        }
                    });
                });
            });
        });
    </script>
</body>
</html>
